global:
  resolve_timeout: 5m
  slack_api_url: ''

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'telegram'
  routes:
    - match:
        severity: critical
      receiver: 'telegram'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'telegram'
      repeat_interval: 4h

receivers:
  - name: 'telegram'
    webhook_configs:
      - url: 'http://telegram-bot:8443/alert'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
